name: Web Pages Deploy

on:
  push:
    branches:
      - main
    paths:
      - "Docs_TG_Platform/web/**"
      - ".github/workflows/web-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: web-pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: Docs_TG_Platform/web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Docs_TG_Platform/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export (MSW demo)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /my
          NEXT_PUBLIC_USE_MSW: "1"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Docs_TG_Platform/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
